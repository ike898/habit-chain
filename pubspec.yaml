name: habit_chain
description: "Visual habit tracker with chain streaks"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Persistence
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Ads
  google_mobile_ads: ^5.3.0

  # In-app purchase
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
